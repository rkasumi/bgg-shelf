name: GHCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-sync-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive image tags
        id: image
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./jobs/sync/Dockerfile
          push: true
          tags: |
            ghcr.io/rkasumi/bgg-shelf:latest
            ghcr.io/rkasumi/bgg-shelf:sha-${{ steps.image.outputs.short_sha }}
      - name: Write image summary
        run: echo "image digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
